<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple AI Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="layout">
      <aside class="glass panel">
        <div class="brand">
          <div class="logo">AI</div>
          <div>
            <h2>Neon Agent</h2>
            <p>Dynamic Intelligence</p>
          </div>
        </div>

        <section class="card">
          <div class="section-title">
            <h3>会话</h3>
            <button id="newSessionBtn" class="btn ghost">+ 新建</button>
          </div>
          <ul id="sessions" class="session-list"></ul>
        </section>

        <section class="card">
          <h3>模型</h3>
          <select id="modelSelect"></select>
        </section>

        <section class="card">
          <h3>能力模块</h3>
          <div id="abilities" class="ability-list"></div>
        </section>
      </aside>

      <main class="glass panel main-panel">
        <header class="chat-header">
          <h3>对话窗口</h3>
          <span class="status-dot">● 在线</span>
        </header>

        <div id="chat"></div>

        <div class="composer">
          <textarea id="messageInput" placeholder="输入你的想法...（Shift+Enter换行）"></textarea>
          <div class="row">
            <label class="mode-toggle">
              <input type="checkbox" id="evolveMode" />
              <span>进化模式</span>
            </label>
            <button id="sendBtn" class="btn primary">发送</button>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
