<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple AI Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel sidebar">
        <div class="brand">
          <div class="logo">AI</div>
          <h2>Agent</h2>
        </div>

        <section class="card">
          <div class="section-title">
            <h3>会话</h3>
            <button id="newSessionBtn" class="icon-btn" title="新建会话" aria-label="新建会话">＋</button>
          </div>
          <ul id="sessions" class="session-list"></ul>
        </section>
      </aside>

      <main class="panel main-panel">
        <header class="chat-header">
          <h3>对话窗口</h3>
          <div class="model-inline">
            <label for="modelSelect">模型</label>
            <select id="modelSelect"></select>
          </div>
        </header>

        <div id="chat"></div>

        <div class="composer">
          <textarea id="messageInput" placeholder="输入你的想法...（Shift+Enter换行）"></textarea>
          <div class="row">
            <button id="sendBtn" class="btn primary">发送</button>
          </div>
        </div>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
